<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accelerator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; background: #fff; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
.card { text-align: center; max-width: 500px; width: 100%; }
.desc { font-size: .85rem; color: #888; line-height: 1.6; margin-bottom: 20px; }
form { margin-bottom: 20px; }
input { width: 100%; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: .85rem; font-family: monospace; color: #333; padding: 10px 12px; background: #fff; }
input::placeholder { color: #ccc; }
a { color: #333; text-decoration: underline; font-size: .85rem; }
a:hover { color: #000; }
</style>
</head>
<body>
<div class="card">
<p class="desc">Enter a URL to accelerate web access or download files. <code>https://</code> can be omitted.</p>
<form onsubmit="go(event)">
<input id="url" type="text" placeholder="example.com/file.zip" autofocus>
</form>
<p><a href="/">&#8592; Back to Connection Info</a></p>
</div>
<script>
function go(e) { e.preventDefault(); var v = document.getElementById('url').value.trim(); if (v) location.href = '/' + v; }
</script>
</body>
</html>
